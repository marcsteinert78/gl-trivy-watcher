stages:
  - test
  - security
  - build

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  GO_VERSION: "1.23"

# ============================================================================
# Test Stage
# ============================================================================

test:unit:
  stage: test
  image: golang:${GO_VERSION}  # Non-alpine for CGO/race support
  tags:
    - pve-local
  script:
    - go mod download
    - go test -v -race -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - coverage.out
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test:lint:
  stage: test
  image: golangci/golangci-lint:latest
  tags:
    - pve-local
  script:
    - golangci-lint run --timeout 5m
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test:build:
  stage: test
  image: golang:${GO_VERSION}-alpine
  tags:
    - pve-local
  before_script:
    - apk add --no-cache git
  script:
    - CGO_ENABLED=0 go build -ldflags="-w -s" -o /dev/null .
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ============================================================================
# Security Stage
# ============================================================================

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

# Override SAST to use correct tags
semgrep-sast:
  tags:
    - pve-local

# Override dependency scanning
gemnasium-dependency_scanning:
  tags:
    - pve-local

# Override secret detection
secret_detection:
  tags:
    - pve-local

# Go-specific vulnerability scanning
govulncheck:
  stage: security
  image: golang:${GO_VERSION}-alpine
  tags:
    - pve-local
  before_script:
    - apk add --no-cache git
    - go install golang.org/x/vuln/cmd/govulncheck@latest
  script:
    - govulncheck ./...
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ============================================================================
# Build Stage
# ============================================================================

build:container:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  tags:
    - pve-local
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${IMAGE_TAG}"
      --destination "${IMAGE_LATEST}"
      --cache=true
      --cache-ttl=168h
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        IMAGE_TAG: $CI_REGISTRY_IMAGE:mr-$CI_MERGE_REQUEST_IID
  needs:
    - job: test:unit
    - job: test:build
