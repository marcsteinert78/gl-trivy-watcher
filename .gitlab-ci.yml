include:
  - component: $CI_SERVER_FQDN/msteinert1/ci-components/go-pipeline@main
    inputs:
      build_path: "."
      smoke_test_enabled: false

# Schema drift test: re-fetch upstream GitLab Container Scanning schema
# and verify compatibility. Runs via scheduled pipeline with
# SCHEMA_DRIFT_CHECK=true.
test:schema-drift:
  stage: test
  image: golang:1.25
  tags:
    - pve-local
  script:
    - apt-get update && apt-get install -y --no-install-recommends curl
    - curl -sSLf -o testdata/container-scanning-report-format.json
      "https://gitlab.com/gitlab-org/security-products/security-report-schemas/-/raw/master/dist/container-scanning-report-format.json"
    - go test -run 'Schema' -v ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEMA_DRIFT_CHECK == "true"

# Exclude schema drift check from container scanning schedule
container_scanning:
  rules:
    - if: $SCHEMA_DRIFT_CHECK == "true"
      when: never
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# After build, push the freshly built image through the central image-mirror
# pipeline so it ends up in `private-registry/mirror/internal/trivy-watcher`
# (publicly pullable). Same scan/sign gate as upstream mirror entries; lets
# workloads pull anonymously — no per-namespace pull-secret config required.
#
# Uses GitLab multi-project pipeline trigger via `trigger:` keyword. Auth is
# automatic ($CI_JOB_TOKEN) — image-mirror's `Settings → CI/CD → Token Access`
# must list this project as an allowed source (one-time setup, no token in CI
# variables).
trigger:image-mirror:
  stage: container-security
  needs:
    - job: build:container
  variables:
    # Path-only form (image-mirror prepends $CI_REGISTRY/).
    TRIGGER_IMAGE: "${CI_PROJECT_PATH}:${CI_COMMIT_SHORT_SHA}"
  trigger:
    project: msteinert1/homeserver/tools/image-mirror
    branch: main
    # `depend` makes this job inherit the downstream pipeline status —
    # if the mirror pipeline fails (scan rejection, push error), this
    # job goes red too, so the source pipeline reflects supply-chain health.
    strategy: depend
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
