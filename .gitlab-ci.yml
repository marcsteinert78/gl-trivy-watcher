include:
  - component: $CI_SERVER_FQDN/msteinert1/ci-components/go-pipeline@main
    inputs:
      build_path: "."
      smoke_test_enabled: false
  # Cosign-sign the image at the project registry with the Vault Transit
  # key before mirror-trigger fires. Gives verify-image-signatures
  # coverage for direct pulls of
  #   registry.k8s.marc-steinert.de/msteinert1/homeserver/tools/trivy-watcher
  # The mirror path gets its own signature later from mirror-internal.sh
  # in the image-mirror pipeline.
  - component: $CI_SERVER_FQDN/msteinert1/ci-components/cosign-sign@main
  # After build, mirror the image to `mirror/internal/trivy-watcher` via
  # the central image-mirror pipeline. See the component for prereqs.
  - component: $CI_SERVER_FQDN/msteinert1/ci-components/mirror-internal-trigger@main

# Schema drift test: re-fetch upstream GitLab Container Scanning schema
# and verify compatibility. Runs via scheduled pipeline with
# SCHEMA_DRIFT_CHECK=true.
test:schema-drift:
  stage: test
  image: golang:1.25
  tags:
    - pve-local
  script:
    - apt-get update && apt-get install -y --no-install-recommends curl
    - curl -sSLf -o testdata/container-scanning-report-format.json
      "https://gitlab.com/gitlab-org/security-products/security-report-schemas/-/raw/master/dist/container-scanning-report-format.json"
    - go test -run 'Schema' -v ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEMA_DRIFT_CHECK == "true"

# Exclude schema drift check from container scanning schedule
container_scanning:
  rules:
    - if: $SCHEMA_DRIFT_CHECK == "true"
      when: never
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# trigger:image-mirror is now provided by the mirror-internal-trigger
# CI component (included above) — defaults match the standard layout
# (build:container in container-security stage, single image per repo).
